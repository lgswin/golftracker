<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="골프기록">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F3D2B">
<title>골프 스코어</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231F3D2B'/%3E%3Ccircle cx='50' cy='40' r='16' fill='%23F7F3E8'/%3E%3Crect x='47' y='40' width='4' height='38' fill='%23F7F3E8'/%3E%3Cpath d='M51 42 L74 50 L51 58 Z' fill='%23C4432C'/%3E%3C/svg%3E">
<style>
  :root{
    --fairway-deep:#1F3D2B;
    --fairway:#2D5F3F;
    --fairway-bright:#4A8B5C;
    --cream:#F7F3E8;
    --cream-dim:#E8E1D0;
    --flag-red:#C4432C;
    --ink:#182018;
    --ink-soft:#5B685E;
    --gold:#C79A3D;
    --line: rgba(24,32,24,0.10);
    --shadow: 0 8px 24px rgba(24,32,24,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    width:100%;
    overflow:hidden;
    position:fixed;
    overscroll-behavior:none;
  }
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none;
    user-select:none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app{ height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--fairway-deep);
    color:var(--cream);
    padding:18px 20px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    flex-shrink:0;
  }
  .topbar .brand{
    font-size:22px;
    font-weight:800;
    letter-spacing:0.5px;
  }
  .topbar .brand small{
    display:block;
    font-size:11px;
    font-weight:500;
    letter-spacing:2px;
    color:var(--gold);
    margin-top:2px;
    text-transform:uppercase;
  }
  .icon-btn{
    background:rgba(247,243,232,0.12);
    border:none;
    color:var(--cream);
    width:40px;height:40px;
    border-radius:12px;
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .icon-btn:active{ background:rgba(247,243,232,0.24); }

  /* ---------- Screens ---------- */
  .screen{ display:none; flex:1; flex-direction:column; }
  .screen.active{ display:flex; min-height:0; }

  /* ---------- Home / list ---------- */
  #home-list{
    flex:1;
    min-height:0;
    padding:16px 16px 100px;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }
  .empty-state{
    margin-top:60px;
    text-align:center;
    color:var(--ink-soft);
    padding:0 30px;
  }
  .empty-state .flag{ font-size:44px; margin-bottom:10px; }
  .empty-state h3{ margin:0 0 6px; color:var(--ink); font-size:18px; }
  .empty-state p{ margin:0; font-size:14px; line-height:1.5; }

  .round-card{
    background:#fff;
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:12px;
    box-shadow:var(--shadow);
    border-left:6px solid var(--fairway-bright);
    cursor:pointer;
    position:relative;
  }
  .round-card .date{ font-size:12px; color:var(--ink-soft); font-weight:600; letter-spacing:0.5px; }
  .round-card .course{ font-size:19px; font-weight:800; margin-top:2px; color:var(--fairway-deep); }
  .round-card .stats{ display:flex; align-items:baseline; gap:10px; margin-top:10px; }
  .round-card .total{ font-size:30px; font-weight:800; }
  .round-card .to-par{ font-size:14px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .to-par.under{ background:#E4EEE6; color:var(--fairway); }
  .to-par.even{ background:#EFEAD9; color:var(--ink-soft); }
  .to-par.over{ background:#F7E4DE; color:var(--flag-red); }
  .round-card .del{
    position:absolute; top:14px; right:14px;
    color:var(--ink-soft); font-size:13px; font-weight:600;
    padding:4px 8px;
  }
  .round-card.in-progress{ border-left-color:var(--gold); }
  .round-card-top{ display:flex; align-items:center; gap:8px; padding-right:44px; }
  .status-badge{
    background:var(--gold); color:#fff; font-size:10px; font-weight:800;
    padding:3px 9px; border-radius:20px; letter-spacing:0.5px;
  }
  .resume-hint{ font-size:12px; font-weight:700; color:var(--gold); margin-top:8px; }

  .fab{
    position:fixed; right:20px; bottom: calc(24px + env(safe-area-inset-bottom));
    background:var(--flag-red);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:16px 24px;
    font-size:16px;
    font-weight:800;
    box-shadow:0 10px 24px rgba(196,67,44,0.4);
    display:flex; align-items:center; gap:8px;
    cursor:pointer;
    z-index:20;
  }
  .fab:active{ transform:scale(0.97); }

  /* ---------- Setup screen ---------- */
  .setup-body{ flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:20px 20px 40px; }
  .field-label{
    font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink-soft); margin:22px 0 8px;
  }
  .text-input{
    width:100%;
    padding:14px 16px;
    font-size:17px;
    border-radius:14px;
    border:2px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-weight:600;
  }
  .text-input:focus{ outline:none; border-color:var(--fairway-bright); }

  .date-select-row{ display:flex; gap:8px; }
  .date-select-wrap{ position:relative; flex:1; min-width:0; }
  .date-select{
    width:100%;
    box-sizing:border-box;
    padding:14px 26px 14px 12px;
    font-size:16px;
    font-weight:700;
    border-radius:14px;
    border:2px solid var(--line);
    background:#fff;
    color:var(--ink);
    -webkit-appearance:none;
    appearance:none;
    text-align:center;
  }
  .date-select:focus{ outline:none; border-color:var(--fairway-bright); }
  .date-caret{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    pointer-events:none; color:var(--ink-soft); font-size:11px;
  }

  .mode-toggle{ display:flex; gap:10px; }
  .mode-btn{
    flex:1;
    background:#fff;
    border:2px solid var(--line);
    border-radius:14px;
    padding:12px 12px;
    text-align:left;
  }
  .mode-btn.active{
    border-color:var(--fairway-bright);
    box-shadow:0 0 0 3px rgba(74,139,92,0.15);
  }
  .mode-btn-title{ font-size:14px; font-weight:800; color:var(--fairway-deep); }
  .mode-btn-desc{ font-size:11px; color:var(--ink-soft); margin-top:4px; line-height:1.35; }

  .par-grid-title{ display:flex; justify-content:space-between; align-items:center; }
  .par-preset{
    font-size:12px; font-weight:700; color:var(--fairway);
    background:var(--cream-dim); padding:6px 10px; border-radius:10px; border:none;
  }
  .nine-label{
    font-size:12px; font-weight:800; color:var(--gold); letter-spacing:1px;
    margin:16px 0 8px; text-transform:uppercase;
  }
  .hole-par-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
  }
  .hole-par-cell{
    background:#fff;
    border-radius:14px;
    padding:10px 8px;
    text-align:center;
    box-shadow:0 2px 8px rgba(24,32,24,0.06);
    border:2px solid transparent;
  }
  .hole-par-cell .hnum{ font-size:11px; font-weight:800; color:var(--ink-soft); }
  .hole-par-cell .pval{ font-size:26px; font-weight:800; margin:4px 0; color:var(--fairway-deep); }
  .hole-par-cell .par-steps{ display:flex; justify-content:center; gap:6px; }
  .par-step-btn{
    width:30px; height:30px; border-radius:9px; border:none;
    background:var(--cream-dim); color:var(--fairway-deep);
    font-size:17px; font-weight:800; display:flex; align-items:center; justify-content:center;
  }
  .par-step-btn:active{ background:var(--fairway-bright); color:#fff; }

  .nine-block{ margin-top:18px; }
  .nine-block-head{
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; margin-bottom:8px;
  }
  .nine-block-title{
    font-size:12px; font-weight:800; color:var(--gold); letter-spacing:1px;
    text-transform:uppercase;
  }
  .nine-block-actions{ display:flex; gap:6px; flex-shrink:0; }
  .nine-block-actions .par-preset{ padding:5px 9px; font-size:11px; }
  .nine-block-source{
    font-size:11px; color:var(--fairway); font-weight:700;
    margin:-4px 0 8px;
  }

  .primary-btn{
    width:100%;
    padding:16px;
    background:var(--fairway-deep);
    color:var(--cream);
    border:none;
    border-radius:16px;
    font-size:17px;
    font-weight:800;
    margin-top:28px;
    box-shadow:var(--shadow);
  }
  .primary-btn:active{ opacity:0.9; }
  .ghost-btn{
    width:100%; padding:14px; background:transparent; color:var(--ink-soft);
    border:none; font-size:15px; font-weight:700; margin-top:10px;
  }

  /* ---------- Round / play screen ---------- */
  .round-header{
    background:var(--fairway-deep);
    color:var(--cream);
    padding:14px 18px 16px;
    flex-shrink:0;
  }
  .round-header .rh-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .round-header .rh-course{ font-size:18px; font-weight:800; }
  .rh-course-row{ display:flex; align-items:center; gap:6px; }
  .rename-btn{
    background:rgba(247,243,232,0.14);
    border:none;
    color:var(--cream);
    width:24px; height:24px;
    border-radius:8px;
    font-size:12px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .rename-btn:active{ background:rgba(247,243,232,0.28); }
  .round-header .rh-date{ font-size:12px; color:rgba(247,243,232,0.65); margin-top:2px; }
  .rh-summary{ display:flex; gap:18px; margin-top:12px; }
  .rh-stat{ }
  .rh-stat .n{ font-size:22px; font-weight:800; }
  .rh-stat .l{ font-size:10px; letter-spacing:1px; text-transform:uppercase; color:rgba(247,243,232,0.6); }

  .hole-strip{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 14px 10px;
    background:#fff;
    border-bottom:1px solid var(--line);
  }
  .hole-chip{
    flex:0 0 auto;
    width:44px;height:52px;
    border-radius:12px;
    background:var(--cream-dim);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:800;
    color:var(--ink-soft);
    border:2px solid transparent;
  }
  .hole-chip .hn{ font-size:12px; }
  .hole-chip .hs{ font-size:16px; margin-top:2px; }
  .hole-chip.current{ border-color:var(--fairway-bright); background:#fff; color:var(--fairway-deep); }
  .hole-chip.done.under{ background:#E4EEE6; color:var(--fairway); }
  .hole-chip.done.over{ background:#F7E4DE; color:var(--flag-red); }
  .hole-chip.done.even{ background:var(--cream-dim); color:var(--ink); }

  .play-area{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    gap:18px;
    overflow-y:auto;
    min-height:0;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }
  .hole-title{ text-align:center; }
  .hole-title .big{ font-size:15px; font-weight:800; letter-spacing:2px; color:var(--ink-soft); text-transform:uppercase; }
  .hole-title .par{ font-size:15px; color:var(--gold); font-weight:800; margin-top:4px; }

  .stroke-wrap{ display:flex; flex-direction:column; align-items:center; gap:22px; width:100%; max-width:380px; }
  .stroke-buttons-row{ display:flex; gap:16px; width:100%; }
  .stroke-btn{
    flex:1;
    height:120px;
    border-radius:26px;
    border:none;
    font-size:44px;
    font-weight:800;
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow);
  }
  .stroke-btn.minus{ background:#fff; color:var(--ink-soft); border:2px solid var(--line); }
  .stroke-btn.plus{ background:var(--flag-red); color:#fff; }
  .stroke-btn:active{ transform:scale(0.94); }
  .stroke-btn:disabled{ opacity:0.35; box-shadow:none; }
  .stroke-btn:disabled:active{ transform:none; }
  .stroke-display{
    width:200px; height:200px;
    border-radius:50%;
    background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: 0 0 0 10px var(--cream-dim), var(--shadow);
  }
  .stroke-display .val{ font-size:84px; font-weight:800; color:var(--fairway-deep); line-height:1; }
  .stroke-display .rel{ font-size:15px; font-weight:700; margin-top:6px; color:var(--ink-soft); }
  .stroke-display .rel.rel-cap{ color:var(--flag-red); }

  .nav-row{
    display:flex; gap:12px; width:100%; max-width:360px;
  }
  .nav-btn{
    flex:1; padding:14px; border-radius:14px; border:none;
    font-size:15px; font-weight:800;
    background:var(--cream-dim); color:var(--fairway-deep);
  }
  .nav-btn:active{ background:var(--fairway-bright); color:#fff; }
  .nav-btn.finish{ background:var(--fairway-deep); color:var(--cream); }
  .nav-btn:disabled{ opacity:0.35; }

  .bottom-bar{
    flex:0 0 auto;
    background:var(--cream);
    border-top:1px solid var(--line);
    padding:12px 20px calc(12px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 16px rgba(24,32,24,0.08);
  }

  /* ---------- Detail (view saved round) ---------- */
  .detail-table{
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    flex:1;
    min-height:0;
    overflow:hidden;
    touch-action:none;
    display:flex;
    gap:10px;
  }
  .detail-nine{
    flex:1;
    min-width:0;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
  }
  .detail-row{
    display:grid; grid-template-columns: 22px 1fr 26px 26px;
    gap:4px;
    padding:6px 8px;
    font-size:11px;
    border-bottom:1px solid var(--line);
    align-items:center;
    white-space:nowrap;
    overflow:hidden;
  }
  .detail-row > div{ overflow:hidden; text-overflow:ellipsis; }
  .detail-row.head{ background:var(--fairway-deep); color:var(--cream); font-weight:800; font-size:9px; text-transform:uppercase; letter-spacing:0.5px; }
  .detail-row:last-child{ border-bottom:none; }
  .detail-row .hc{ font-weight:800; color:var(--ink-soft); }
  .detail-row .sc{ font-weight:800; text-align:right; }
  .detail-row .pc{ text-align:right; color:var(--ink-soft); }
  .detail-row .diffc{ text-align:right; font-weight:700; }
  .diffc.under{ color:var(--fairway); }
  .diffc.over{ color:var(--flag-red); }
  .diffc.even{ color:var(--ink-soft); }

  .toast{
    position:fixed; left:50%; bottom:30px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px;
    font-size:13px; font-weight:600; z-index:99; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .toast.show{ opacity:1; }

  .confirm-overlay{
    position:fixed; inset:0; background:rgba(24,32,24,0.5);
    display:none; align-items:flex-end; z-index:50;
  }
  .confirm-overlay.show{ display:flex; }
  .confirm-sheet{
    background:var(--cream); width:100%; border-radius:22px 22px 0 0;
    padding:22px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .confirm-sheet h3{ margin:0 0 8px; font-size:17px; }
  .confirm-sheet p{ margin:0 0 18px; color:var(--ink-soft); font-size:14px; }
  .confirm-actions{ display:flex; gap:10px; }
  .confirm-actions button{ flex:1; padding:14px; border-radius:14px; border:none; font-weight:800; font-size:15px; }
  .confirm-cancel{ background:var(--cream-dim); color:var(--ink); }
  .confirm-ok-danger{ background:var(--flag-red); color:#fff; }
  .confirm-ok-positive{ background:var(--fairway-deep); color:var(--cream); }

  .sheet-overlay{
    position:fixed; inset:0; background:rgba(24,32,24,0.5);
    display:none; align-items:flex-end; z-index:60;
  }
  .sheet-overlay.show{ display:flex; }
  .sheet{
    background:var(--cream); width:100%; max-height:78vh;
    border-radius:22px 22px 0 0;
    display:flex; flex-direction:column;
  }
  .sheet-header{
    display:flex; flex-direction:column; align-items:center;
    gap:8px;
    padding:16px 20px 8px;
  }
  .sheet-close-center{
    background:var(--cream-dim);
    color:var(--ink-soft);
    border:none;
    width:34px; height:34px;
    border-radius:50%;
    font-size:15px;
    font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .sheet-close-center:active{ background:var(--fairway-bright); color:#fff; }
  .sheet-title{ font-size:17px; font-weight:800; color:var(--fairway-deep); }
  .sheet-body{
    overflow-y:auto;
    padding:8px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .template-item{
    background:#fff; border-radius:16px; padding:14px 16px;
    margin-bottom:10px; box-shadow:var(--shadow); position:relative;
    cursor:pointer;
  }
  .template-name{ font-size:16px; font-weight:800; color:var(--fairway-deep); padding-right:44px; }
  .template-par{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
  .template-item .del{
    position:absolute; top:14px; right:14px;
    color:var(--ink-soft); font-size:12px; font-weight:700;
  }

  /* ---------------- Mobile fine-tuning ---------------- */
  /* Prevent iOS auto-zoom on focus: inputs must be >=16px (already 17px above) */

  /* Compact vertical rhythm for shorter phones (SE, mini) and landscape */
  @media (max-height: 720px){
    .topbar{ padding:12px 18px 12px; }
    .round-header{ padding:10px 16px 12px; }
    .rh-summary{ margin-top:8px; gap:14px; }
    .hole-strip{ padding:10px 12px 8px; }
    .play-area{ padding:10px 16px; gap:10px; }
    .stroke-wrap{ gap:14px; }
    .stroke-display{ width:150px; height:150px; box-shadow:0 0 0 8px var(--cream-dim), var(--shadow); }
    .stroke-display .val{ font-size:58px; }
    .stroke-buttons-row{ gap:12px; }
    .stroke-btn{ height:88px; font-size:34px; border-radius:20px; }
    .hole-title .big{ font-size:13px; }
    .nav-btn{ padding:12px; font-size:14px; }
    .setup-body{ padding:14px 18px 24px; }
    .field-label{ margin:16px 0 6px; }
    .hole-par-grid{ gap:8px; }
    .hole-par-cell{ padding:8px 6px; }
    .primary-btn{ margin-top:18px; padding:14px; }
  }

  /* Very narrow phones (iPhone SE 1st/2nd gen width, older small Androids) */
  @media (max-width: 360px){
    .hole-par-grid{ gap:7px; }
    .hole-par-cell .pval{ font-size:22px; }
    .par-step-btn{ width:27px; height:27px; font-size:15px; }
    .stroke-wrap{ gap:12px; }
    .stroke-display{ width:160px; height:160px; }
    .stroke-display .val{ font-size:60px; }
    .stroke-btn{ height:88px; font-size:34px; }
    .round-card .total{ font-size:26px; }
    .brand{ font-size:19px !important; }
    .date-select-row{ gap:6px; }
    .date-select{ padding:12px 20px 12px 8px; font-size:16px; }
    .date-caret{ right:6px; }
  }

  /* Landscape phones: stack play controls tighter, allow scroll fallback */
  @media (max-height: 430px) and (orientation: landscape){
    .play-area{ overflow-y:auto; }
    .stroke-wrap{ gap:12px; max-width:320px; }
    .stroke-display{ width:120px; height:120px; }
    .stroke-display .val{ font-size:46px; }
    .stroke-btn{ height:72px; font-size:28px; border-radius:18px; }
    .nav-row{ max-width:420px; }
  }

  /* Larger phones (Pro Max) get a touch more breathing room */
  @media (min-width: 428px){
    .play-area{ gap:22px; }
    .stroke-display{ width:220px; height:220px; }
    .stroke-display .val{ font-size:92px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===================== HOME ===================== -->
  <div class="screen active" id="screen-home">
    <div class="topbar">

        <div class="rh-stat"><div class="n" id="play-thru">0/18</div><div class="l">현재 홀</div></div>

    <div class="hole-strip" id="hole-strip"></div>
    <div class="play-area">
      <div class="hole-title">
        <div class="big" id="play-holenum">HOLE 1</div>

      <div class="stroke-wrap">
        <div class="stroke-display">

          <div class="rel" id="stroke-rel">-</div>

        <div class="stroke-buttons-row">
          <button class="stroke-btn minus" id="btn-stroke-minus">－</button>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "greencount_rounds_v1";
  const TEMPLATES_KEY = "greencount_templates_v1";
  const NINE_TEMPLATES_KEY = "greencount_nine_templates_v1";

  /* ---------------- storage ---------------- */
  function loadRounds(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveRounds(rounds){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rounds));
  }
  let rounds = loadRounds();

  function loadTemplates(){
    try{
      const raw = localStorage.getItem(TEMPLATES_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveTemplates(t){
    localStorage.setItem(TEMPLATES_KEY, JSON.stringify(t));
  }
  let templates = loadTemplates();

  function loadNineTemplates(){
    try{
      const raw = localStorage.getItem(NINE_TEMPLATES_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveNineTemplates(t){
    localStorage.setItem(NINE_TEMPLATES_KEY, JSON.stringify(t));
  }
  let nineTemplates = loadNineTemplates();
  function chunk9(arr){
    const out = [];
    for(let i=0; i<arr.length; i+=9) out.push(arr.slice(i, i+9));
    return out;
  }

  /* ---------------- helpers ---------------- */
  function uid(){ return 'r_' + Date.now() + '_' + Math.floor(Math.random()*10000); }
  function fmtDate(iso){
    const d = new Date(iso + 'T00:00:00');
    if(isNaN(d)) return iso;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /* ---------------- custom date select (year/month/day) ---------------- */
  function daysInMonth(year, month){
    return new Date(year, month, 0).getDate();
  }
  function populateDaySelect(year, month, preferredDay){
    const daySel = document.getElementById('select-day');
    const dim = daysInMonth(year, month);
    const current = preferredDay || parseInt(daySel.value, 10) || 1;
    const keep = Math.min(current, dim);
    daySel.innerHTML = '';
    for(let dd = 1; dd <= dim; dd++){
      const opt = document.createElement('option');
      opt.value = dd;
      opt.textContent = dd + '일';
      if(dd === keep) opt.selected = true;
      daySel.appendChild(opt);
    }
  }
  function populateDateSelects(iso){
    const [y, m, d] = iso.split('-').map(Number);
    const yearSel = document.getElementById('select-year');
    const monthSel = document.getElementById('select-month');
    const curYear = new Date().getFullYear();
    yearSel.innerHTML = '';
    for(let yy = curYear - 5; yy <= curYear + 1; yy++){
      const opt = document.createElement('option');
      opt.value = yy;
      opt.textContent = yy + '년';
      if(yy === y) opt.selected = true;
      yearSel.appendChild(opt);
    }
    monthSel.innerHTML = '';
    for(let mm = 1; mm <= 12; mm++){
      const opt = document.createElement('option');
      opt.value = mm;
      opt.textContent = mm + '월';
      if(mm === m) opt.selected = true;
      monthSel.appendChild(opt);
    }
    populateDaySelect(y, m, d);
  }
  function getSelectedDateISO(){
    const y = document.getElementById('select-year').value;
    const m = String(document.getElementById('select-month').value).padStart(2, '0');
    const d = String(document.getElementById('select-day').value).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  function onYearOrMonthChange(){
    const y = parseInt(document.getElementById('select-year').value, 10);
    const m = parseInt(document.getElementById('select-month').value, 10);
    const d = parseInt(document.getElementById('select-day').value, 10);
    populateDaySelect(y, m, d);
  }
  document.getElementById('select-year').addEventListener('change', onYearOrMonthChange);
  document.getElementById('select-month').addEventListener('change', onYearOrMonthChange);

  function toParLabel(diff){
    if(diff === 0) return 'E';
    return diff > 0 ? ('+' + diff) : String(diff);
  }
  function toParClass(diff){
    if(diff === 0) return 'even';
    return diff > 0 ? 'over' : 'under';
  }
  function roundStats(r){
    const mode = r.scoreMode || 'par';
    let total, parSum, hasAny;
    if(mode === 'zero'){
      const entered = r.scores.filter(s=>s>0);
      total = entered.reduce((a,b)=>a+b,0);
      parSum = r.pars.reduce((sum,p,i)=> r.scores[i]>0 ? sum+p : sum, 0);
      hasAny = entered.length > 0;
    } else {
      total = r.scores.reduce((a,b)=>a+(b||0),0);
      parSum = r.pars.reduce((a,b)=>a+(b||0),0);
      hasAny = true;
    }
    return { total, parSum, diff: total - parSum, hasAny };
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1600);
  }
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ---------------- confirm dialog ---------------- */
  let confirmCb = null;
  function askConfirm(title, msg, cb, okText, okKind){
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    const okBtn = document.getElementById('confirm-ok');
    okBtn.textContent = okText || '삭제';
    okBtn.classList.remove('confirm-ok-danger', 'confirm-ok-positive');
    okBtn.classList.add(okKind === 'positive' ? 'confirm-ok-positive' : 'confirm-ok-danger');
    confirmCb = cb;
    document.getElementById('confirm-overlay').classList.add('show');
  }
  document.getElementById('confirm-cancel').addEventListener('click', ()=>{
    document.getElementById('confirm-overlay').classList.remove('show');
    confirmCb = null;
  });
  document.getElementById('confirm-ok').addEventListener('click', ()=>{
    document.getElementById('confirm-overlay').classList.remove('show');
    if(confirmCb) confirmCb();
    confirmCb = null;
  });

  /* ---------------- HOME rendering ---------------- */
  function renderHome(){
    const list = document.getElementById('home-list');
    list.innerHTML = '';
    if(rounds.length === 0){
      list.innerHTML = `
        <div class="empty-state">
          <div class="flag">⛳</div>
          <h3>아직 기록된 라운드가 없어요</h3>
          <p>오른쪽 아래 '새 라운드' 버튼을 눌러<br>골프장과 파를 설정하고 시작해보세요.</p>
        </div>`;
      return;
    }
    const sorted = [...rounds].sort((a,b)=> (b.date+b.id).localeCompare(a.date+a.id));
    sorted.forEach(r=>{
      const status = r.status || 'finished';
      const inProgress = status === 'in_progress';
      const { total, diff, hasAny } = roundStats(r);
      const card = document.createElement('div');
      card.className = 'round-card' + (inProgress ? ' in-progress' : '');
      card.innerHTML = `
        <div class="del" data-id="${r.id}">삭제</div>
        <div class="round-card-top">
          <div class="date">${fmtDate(r.date)}</div>
          ${inProgress ? '<div class="status-badge">진행중</div>' : ''}
        </div>
        <div class="course">${escapeHtml(r.courseName)}</div>
        <div class="stats">
          <div class="total">${total}</div>
          <div class="to-par ${toParClass(diff)}">${hasAny ? toParLabel(diff) : 'E'}</div>
        </div>
        ${inProgress ? '<div class="resume-hint">탭하여 이어하기 ›</div>' : ''}`;
      card.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del')) return;
        if(inProgress) openPlay(r.id); else openDetail(r.id);
      });
      card.querySelector('.del').addEventListener('click', (e)=>{
        e.stopPropagation();
        askConfirm('라운드 삭제', `${fmtDate(r.date)} · ${r.courseName} 기록을 삭제할까요?`, ()=>{
          rounds = rounds.filter(x=>x.id !== r.id);
          saveRounds(rounds);
          renderHome();
          showToast('삭제되었습니다');
        });
      });
      list.appendChild(card);
    });
  }
  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ---------------- SETUP screen ---------------- */
  function default9(){ return new Array(9).fill(4); }
  let setupNines = [ {pars: default9()}, {pars: default9()} ]; // 2 blocks (18) or 3 blocks (27)
  let setupScoreMode = 'par';
  const NINE_PATTERN = [4,3,5,4,4,3,4,5,4];

  function renderModeToggle(){
    document.getElementById('mode-btn-par').classList.toggle('active', setupScoreMode === 'par');
    document.getElementById('mode-btn-zero').classList.toggle('active', setupScoreMode === 'zero');
  }
  document.getElementById('mode-btn-par').addEventListener('click', ()=>{
    setupScoreMode = 'par';
    renderModeToggle();
  });
  document.getElementById('mode-btn-zero').addEventListener('click', ()=>{
    setupScoreMode = 'zero';
    renderModeToggle();
  });

  function nineBlockTitle(idx){
    if(idx === 0) return '1~9홀 (전반)';
    if(idx === 1) return '10~18홀 (후반)';
    return '19~27홀 (추가)';
  }

  function renderNineBlocks(){
    const container = document.getElementById('nine-blocks');
    container.innerHTML = '';
    setupNines.forEach((block, bi)=>{
      const wrap = document.createElement('div');
      wrap.className = 'nine-block';
      const sourceHtml = block.sourceLabel ? `<div class="nine-block-source">불러옴: ${escapeHtml(block.sourceLabel)}</div>` : '';
      wrap.innerHTML = `
        <div class="nine-block-head">
          <div class="nine-block-title">${nineBlockTitle(bi)}</div>
          <div class="nine-block-actions">
            <button class="par-preset" data-nine-action="load" data-nine-idx="${bi}">불러오기</button>
            <button class="par-preset" data-nine-action="save" data-nine-idx="${bi}">저장</button>
          </div>
        </div>
        ${sourceHtml}
        <div class="hole-par-grid" id="nine-grid-${bi}"></div>`;
      container.appendChild(wrap);
      const grid = wrap.querySelector(`#nine-grid-${bi}`);
      for(let i=0;i<9;i++){
        const cell = document.createElement('div');
        cell.className = 'hole-par-cell';
        cell.innerHTML = `
          <div class="hnum">HOLE ${bi*9 + i + 1}</div>
          <div class="pval" id="nine-val-${bi}-${i}">${block.pars[i]}</div>
          <div class="par-steps">
            <button class="par-step-btn" data-nine="${bi}" data-i="${i}" data-d="-1">－</button>
            <button class="par-step-btn" data-nine="${bi}" data-i="${i}" data-d="1">＋</button>
          </div>`;
        grid.appendChild(cell);
      }
    });
    container.querySelectorAll('.par-step-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const bi = parseInt(btn.dataset.nine,10);
        const i = parseInt(btn.dataset.i,10);
        const d = parseInt(btn.dataset.d,10);
        let v = setupNines[bi].pars[i] + d;
        v = Math.max(3, Math.min(6, v));
        setupNines[bi].pars[i] = v;
        document.getElementById(`nine-val-${bi}-${i}`).textContent = v;
      });
    });
    container.querySelectorAll('[data-nine-action="load"]').forEach(btn=>{
      btn.addEventListener('click', ()=> openNinePicker(parseInt(btn.dataset.nineIdx,10)));
    });
    container.querySelectorAll('[data-nine-action="save"]').forEach(btn=>{
      btn.addEventListener('click', ()=> openNineSavePrompt(parseInt(btn.dataset.nineIdx,10)));
    });
    updateToggle27Button();
  }

  function updateToggle27Button(){
    const btn = document.getElementById('btn-toggle-27');
    btn.textContent = setupNines.length >= 3 ? '－ 9홀 제거하고 18홀로' : '＋ 9홀 추가해서 27홀로';
  }
  document.getElementById('btn-toggle-27').addEventListener('click', ()=>{
    if(setupNines.length >= 3){
      setupNines.pop();
    } else {
      setupNines.push({pars: default9()});
    }
    renderNineBlocks();
  });

  function openSetup(){
    document.getElementById('input-course').value = '';
    populateDateSelects(todayISO());
    setupNines = [ {pars: default9()}, {pars: default9()} ];
    setupScoreMode = 'par';
    renderModeToggle();
    renderNineBlocks();
    showScreen('screen-setup');
  }

  document.getElementById('btn-new-round').addEventListener('click', openSetup);
  document.getElementById('btn-setup-back').addEventListener('click', ()=> showScreen('screen-home'));
  document.getElementById('btn-preset-72').addEventListener('click', ()=>{
    setupNines.forEach(block => { block.pars = [...NINE_PATTERN]; delete block.sourceLabel; });
    renderNineBlocks();
  });

  /* ---------------- 9-hole course templates (load into a specific block) ---------------- */
  let ninePickerTargetIdx = null;
  let nineSaveTargetIdx = null;

  function renderNinePickerList(){
    const list = document.getElementById('nine-picker-list');
    list.innerHTML = '';
    if(nineTemplates.length === 0){
      list.innerHTML = `
        <div class="empty-state" style="margin-top:10px;">
          <div class="flag">⛳</div>
          <h3>저장된 9홀 코스가 없어요</h3>
          <p>각 구간의 '저장' 버튼으로<br>9홀 코스를 등록해보세요.</p>
        </div>`;
      return;
    }
    const sortedN = [...nineTemplates].sort((a,b)=> a.courseName.localeCompare(b.courseName,'ko') || a.nineName.localeCompare(b.nineName,'ko'));
    sortedN.forEach(t=>{
      const parSum = t.pars.reduce((a,b)=>a+b,0);
      const item = document.createElement('div');
      item.className = 'template-item';
      item.innerHTML = `
        <div class="del" data-id="${t.id}">삭제</div>
        <div class="template-name">${escapeHtml(t.courseName)} · ${escapeHtml(t.nineName)}</div>
        <div class="template-par">9홀 파 ${parSum}</div>`;
      item.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del')) return;
        if(ninePickerTargetIdx === null) return;
        setupNines[ninePickerTargetIdx].pars = [...t.pars];
        setupNines[ninePickerTargetIdx].sourceLabel = `${t.courseName} ${t.nineName}`;
        if(!document.getElementById('input-course').value.trim()){
          document.getElementById('input-course').value = t.courseName;
        }
        renderNineBlocks();
        closeNinePicker();
        showToast(`${t.courseName} ${t.nineName} 코스를 불러왔어요`);
      });
      item.querySelector('.del').addEventListener('click', (e)=>{
        e.stopPropagation();
        askConfirm('9홀 코스 삭제', `'${t.courseName} ${t.nineName}' 코스를 삭제할까요?`, ()=>{
          nineTemplates = nineTemplates.filter(x=>x.id !== t.id);
          saveNineTemplates(nineTemplates);
          renderNinePickerList();
          showToast('삭제되었습니다');
        });
      });
      list.appendChild(item);
    });
  }
  function openNinePicker(idx){
    ninePickerTargetIdx = idx;
    renderNinePickerList();
    document.getElementById('nine-picker-overlay').classList.add('show');
  }
  function closeNinePicker(){
    document.getElementById('nine-picker-overlay').classList.remove('show');
  }
  document.getElementById('btn-nine-picker-close').addEventListener('click', closeNinePicker);
  document.getElementById('nine-picker-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'nine-picker-overlay') closeNinePicker();
  });

  function openNineSavePrompt(idx){
    nineSaveTargetIdx = idx;
    document.getElementById('input-nine-save-course').value = document.getElementById('input-course').value.trim();
    document.getElementById('input-nine-save-name').value = '';
    document.getElementById('nine-save-overlay').classList.add('show');
  }
  function closeNineSavePrompt(){
    document.getElementById('nine-save-overlay').classList.remove('show');
  }
  document.getElementById('btn-nine-save-close').addEventListener('click', closeNineSavePrompt);
  document.getElementById('nine-save-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'nine-save-overlay') closeNineSavePrompt();
  });
  document.getElementById('btn-nine-save-confirm').addEventListener('click', ()=>{
    const courseName = document.getElementById('input-nine-save-course').value.trim();
    const nineName = document.getElementById('input-nine-save-name').value.trim();
    if(!courseName || !nineName){
      showToast('골프장 이름과 코스 이름을 모두 입력해주세요');
      return;
    }
    if(nineSaveTargetIdx === null) return;
    const pars = [...setupNines[nineSaveTargetIdx].pars];
    const existingIdx = nineTemplates.findIndex(t => t.courseName === courseName && t.nineName === nineName);
    const doSave = ()=>{
      const tmpl = { id: existingIdx >= 0 ? nineTemplates[existingIdx].id : uid(), courseName, nineName, pars };
      if(existingIdx >= 0) nineTemplates[existingIdx] = tmpl; else nineTemplates.push(tmpl);
      saveNineTemplates(nineTemplates);
      setupNines[nineSaveTargetIdx].sourceLabel = `${courseName} ${nineName}`;
      renderNineBlocks();
      closeNineSavePrompt();
      showToast('9홀 코스가 저장되었어요');
    };
    if(existingIdx >= 0){
      askConfirm('9홀 코스 저장', `이미 '${courseName} ${nineName}' 코스가 있어요. 덮어쓸까요?`, doSave, '덮어쓰기', 'positive');
    } else {
      doSave();
    }
  });

  /* ---------------- Saved course templates (score card presets) ---------------- */
  function renderTemplateList(){
    const list = document.getElementById('template-list');
    list.innerHTML = '';
    if(templates.length === 0){
      list.innerHTML = `
        <div class="empty-state" style="margin-top:10px;">
          <div class="flag">📋</div>
          <h3>저장된 골프장이 없어요</h3>
          <p>새 라운드 설정 화면 아래의<br>'골프장 정보 저장해두기'로 등록해보세요.</p>
        </div>`;
      return;
    }
    const sortedT = [...templates].sort((a,b)=> a.name.localeCompare(b.name, 'ko'));
    sortedT.forEach(t=>{
      const parSum = t.pars.reduce((a,b)=>a+b,0);
      const item = document.createElement('div');
      item.className = 'template-item';
      item.innerHTML = `
        <div class="del" data-id="${t.id}">삭제</div>
        <div class="template-name">${escapeHtml(t.name)}</div>
        <div class="template-par">코스 파 ${parSum}</div>`;
      item.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del')) return;
        setupNines = chunk9(t.pars).map(p => ({ pars: [...p] }));
        document.getElementById('input-course').value = t.name;
        renderNineBlocks();
        closeTemplateOverlay();
        showToast(`${t.name} 정보를 불러왔어요`);
      });
      item.querySelector('.del').addEventListener('click', (e)=>{
        e.stopPropagation();
        askConfirm('골프장 삭제', `저장된 '${t.name}' 정보를 삭제할까요?`, ()=>{
          templates = templates.filter(x=>x.id !== t.id);
          saveTemplates(templates);
          renderTemplateList();
          showToast('삭제되었습니다');
        });
      });
      list.appendChild(item);
    });
  }
  function openTemplateOverlay(){
    renderTemplateList();
    document.getElementById('template-overlay').classList.add('show');
  }
  function closeTemplateOverlay(){
    document.getElementById('template-overlay').classList.remove('show');
  }
  document.getElementById('btn-load-template').addEventListener('click', openTemplateOverlay);
  document.getElementById('btn-template-close').addEventListener('click', closeTemplateOverlay);
  document.getElementById('template-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'template-overlay') closeTemplateOverlay();
  });

  /* ---------------- Rename saved round's course name ---------------- */
  function openRenameOverlay(){
    const r = getActiveRound();
    document.getElementById('input-rename-course').value = r.courseName;
    document.getElementById('rename-overlay').classList.add('show');
  }
  function closeRenameOverlay(){
    document.getElementById('rename-overlay').classList.remove('show');
  }
  document.getElementById('btn-rename-course').addEventListener('click', openRenameOverlay);
  document.getElementById('btn-rename-close').addEventListener('click', closeRenameOverlay);
  document.getElementById('rename-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'rename-overlay') closeRenameOverlay();
  });
  document.getElementById('btn-rename-save').addEventListener('click', ()=>{
    const name = document.getElementById('input-rename-course').value.trim();
    if(!name){
      showToast('이름을 입력해주세요');
      return;
    }
    const r = getActiveRound();
    r.courseName = name;
    saveRounds(rounds);
    document.getElementById('play-course').textContent = name;
    closeRenameOverlay();
    showToast('이름이 수정되었습니다');
  });

  document.getElementById('btn-save-template').addEventListener('click', ()=>{
    const name = document.getElementById('input-course').value.trim();
    if(!name){
      showToast('골프장 이름을 먼저 입력해주세요');
      return;
    }
    const existingIdx = templates.findIndex(t => t.name === name);
    const doSave = ()=>{
      const combinedPars = setupNines.flatMap(b => b.pars);
      const tmpl = { id: existingIdx >= 0 ? templates[existingIdx].id : uid(), name, pars: combinedPars };
      if(existingIdx >= 0) templates[existingIdx] = tmpl; else templates.push(tmpl);
      saveTemplates(templates);
      showToast('골프장 정보가 저장되었어요');
    };
    if(existingIdx >= 0){
      askConfirm('골프장 정보 저장', `이미 '${name}' 골프장 정보가 있어요. 덮어쓸까요?`, doSave, '덮어쓰기', 'positive');
    } else {
      doSave();
    }
  });

  document.getElementById('btn-start-round').addEventListener('click', ()=>{
    const course = document.getElementById('input-course').value.trim();
    const date = getSelectedDateISO();
    if(!course){
      showToast('골프장 이름을 입력해주세요');
      return;
    }
    const combinedPars = setupNines.flatMap(b => b.pars);
    const newRound = {
      id: uid(),
      courseName: course,
      date: date,
      pars: combinedPars,
      scoreMode: setupScoreMode,
      scores: setupScoreMode === 'zero' ? new Array(combinedPars.length).fill(0) : [...combinedPars],
      status: 'in_progress'
    };
    rounds.push(newRound);
    saveRounds(rounds);
    openPlay(newRound.id);
  });

  /* ---------------- PLAY screen ---------------- */
  let activeRoundId = null;
  let currentHole = 0;

  function getActiveRound(){
    return rounds.find(r=>r.id === activeRoundId);
  }

  function openPlay(id){
    activeRoundId = id;
    const r = getActiveRound();
    currentHole = (typeof r.lastHole === 'number') ? r.lastHole : 0;
    document.getElementById('play-course').textContent = r.courseName;
    document.getElementById('play-date').textContent = fmtDate(r.date);
    document.getElementById('btn-finish-round').textContent = (r.status === 'finished') ? '수정 완료' : '라운드 종료 및 저장';
    renderHoleStrip();
    renderPlayHole();
    renderPlaySummary();
    showScreen('screen-play');
  }

  function renderHoleStrip(){
    const r = getActiveRound();
    const mode = r.scoreMode || 'par';
    const strip = document.getElementById('hole-strip');
    strip.innerHTML = '';
    for(let i=0;i<r.pars.length;i++){
      const chip = document.createElement('div');
      const sc = r.scores[i];
      const untouched = mode === 'zero' && sc === 0;
      let cls = 'hole-chip';
      if(i === currentHole) cls += ' current';
      else if(!untouched){
        const diff = sc - r.pars[i];
        cls += ' done ' + toParClass(diff);
      }
      chip.className = cls;
      chip.innerHTML = `<div class="hn">${i+1}</div><div class="hs">${untouched ? '-' : sc}</div>`;
      chip.addEventListener('click', ()=> goToHole(i));
      strip.appendChild(chip);
    }
    // auto scroll current into view
    requestAnimationFrame(()=>{
      const cur = strip.querySelector('.current');
      if(cur) cur.scrollIntoView({inline:'center', block:'nearest'});
    });
  }

  function renderPlayHole(){
    const r = getActiveRound();
    const mode = r.scoreMode || 'par';
    const par = r.pars[currentHole];
    document.getElementById('play-holenum').textContent = 'HOLE ' + (currentHole+1);
    document.getElementById('play-holepar').textContent = 'PAR ' + par;
    const sc = r.scores[currentHole];
    document.getElementById('stroke-val').textContent = sc;
    const relEl = document.getElementById('stroke-rel');
    if(mode === 'zero' && sc === 0){
      relEl.textContent = '입력 전';
      relEl.classList.remove('rel-cap');
    } else {
      const diff = sc - par;
      relEl.textContent = toParLabel(diff) + ' · ' + parName(diff, sc, par);
      relEl.classList.toggle('rel-cap', sc >= par * 2);
    }
    document.getElementById('btn-hole-prev').disabled = currentHole === 0;
    document.getElementById('btn-hole-next').textContent = currentHole === r.pars.length - 1 ? '완료 ›' : '다음 홀 ›';
    document.getElementById('btn-stroke-plus').disabled = sc >= par * 2;
  }

  function parName(diff, sc, par){
    if(par && sc === par * 2) return '양파';
    if(sc === 1) return '홀인원';
    if(diff <= -3) return '알바트로스';
    if(diff === -2) return '이글';
    if(diff === -1) return '버디';
    if(diff === 0) return '파';
    if(diff === 1) return '보기';
    if(diff === 2) return '더블보기';
    if(diff === 3) return '트리플보기';
    return diff + '오버';
  }

  function renderPlaySummary(){
    const r = getActiveRound();
    const { total, diff, hasAny } = roundStats(r);
    document.getElementById('play-total').textContent = total;
    document.getElementById('play-topar').textContent = hasAny ? toParLabel(diff) : 'E';
    document.getElementById('play-thru').textContent = (currentHole+1) + '/' + r.pars.length;
  }

  function setStroke(delta){
    const r = getActiveRound();
    const mode = r.scoreMode || 'par';
    const par = r.pars[currentHole];
    const minBound = mode === 'zero' ? 0 : 1;
    const maxBound = par * 2;
    let sc = r.scores[currentHole] + delta;
    if(sc < minBound) sc = minBound;
    if(sc > maxBound) sc = maxBound;
    r.scores[currentHole] = sc;
    saveRounds(rounds);
    renderPlayHole();
    renderHoleStrip();
    renderPlaySummary();
  }

  function goToHole(i){
    currentHole = i;
    const r = getActiveRound();
    r.lastHole = i;
    saveRounds(rounds);
    renderHoleStrip();
    renderPlayHole();
    renderPlaySummary();
  }

  document.getElementById('btn-stroke-plus').addEventListener('click', ()=> setStroke(1));
  document.getElementById('btn-stroke-minus').addEventListener('click', ()=> setStroke(-1));

  document.getElementById('btn-hole-prev').addEventListener('click', ()=>{
    if(currentHole > 0) goToHole(currentHole - 1);
  });
  document.getElementById('btn-hole-next').addEventListener('click', ()=>{
    const r = getActiveRound();
    if(currentHole < r.pars.length - 1) goToHole(currentHole + 1);
    else {
      // last hole -> prompt finish
      document.getElementById('btn-finish-round').click();
    }
  });

  document.getElementById('btn-play-close').addEventListener('click', ()=>{
    const r = getActiveRound();
    if(r.status === 'finished'){
      askConfirm('닫기', '지금까지 수정한 내용이 저장되어 있어요.', ()=>{
        showScreen('screen-home');
        renderHome();
      }, '확인', 'positive');
    } else {
      askConfirm('임시 저장', '지금까지 입력한 스코어가 임시 저장되어 있어요. 홈 화면에서 다시 이어할 수 있습니다.', ()=>{
        showScreen('screen-home');
        renderHome();
      }, '홈으로', 'positive');
    }
  });

  document.getElementById('btn-finish-round').addEventListener('click', ()=>{
    const r = getActiveRound();
    const mode = r.scoreMode || 'par';
    const isEdit = r.status === 'finished';
    let msg = isEdit ? '수정한 내용을 저장하고 홈으로 이동합니다.' : '라운드를 저장하고 홈으로 이동합니다.';
    if(!isEdit && mode === 'zero'){
      const missing = r.scores.filter(s=>!s || s===0).length;
      if(missing > 0) msg = `${missing}개 홀이 아직 입력되지 않았어요. 그래도 저장할까요?`;
    }
    askConfirm(isEdit ? '수정 완료' : '라운드 종료 및 저장', msg, ()=>{
      r.status = 'finished';
      saveRounds(rounds);
      showScreen('screen-home');
      renderHome();
      showToast(isEdit ? '수정한 내용이 저장되었습니다' : '라운드가 저장되었습니다');
    }, '저장', 'positive');
  });

  /* ---------------- DETAIL screen ---------------- */
  let detailRoundId = null;

  function openDetail(id){
    detailRoundId = id;
    const r = rounds.find(x=>x.id===id);
    document.getElementById('detail-title').textContent = r.courseName;
    const { total, diff, hasAny } = roundStats(r);
    const courseParTotal = r.pars.reduce((a,b)=>a+(b||0),0);
    document.getElementById('detail-total').textContent = total;
    document.getElementById('detail-topar').textContent = hasAny ? toParLabel(diff) : 'E';
    document.getElementById('detail-parsum').textContent = courseParTotal;

    const table = document.getElementById('detail-table');
    table.innerHTML = '';
    const nineLabels = ['전반 (OUT)', '후반 (IN)', '추가 (EX)'];
    const sections = [];
    for(let start=0; start<r.pars.length; start+=9){
      sections.push([start, Math.min(start+9, r.pars.length)]);
    }
    sections.forEach(([start,end], si)=>{
      const label = nineLabels[si] || `${si+1}구간`;
      const wrap = document.createElement('div');
      wrap.className = 'detail-nine';
      let rowsHtml = `<div class="detail-row head"><div>홀</div><div>${label}</div><div style="text-align:right">파</div><div style="text-align:right">타수</div></div>`;
      let subTotal = 0, subPar = 0;
      for(let i=start;i<end;i++){
        const sc = r.scores[i] || 0;
        const par = r.pars[i];
        subTotal += sc; subPar += par;
        const diffH = sc - par;
        rowsHtml += `<div class="detail-row">
          <div class="hc">${i+1}</div>
          <div>${sc>0 ? parName(diffH, sc, par) : '-'}</div>
          <div class="pc">${par}</div>
          <div class="sc">${sc>0?sc:'-'}</div>
        </div>`;
      }
      rowsHtml += `<div class="detail-row" style="background:var(--cream-dim); font-weight:800;">
        <div></div><div>소계</div><div class="pc">${subPar}</div><div class="sc">${subTotal||'-'}</div>
      </div>`;
      wrap.innerHTML = rowsHtml;
      table.appendChild(wrap);
    });

    showScreen('screen-detail');
  }

  document.getElementById('btn-detail-back').addEventListener('click', ()=>{
    showScreen('screen-home');
    renderHome();
  });
  document.getElementById('btn-detail-edit').addEventListener('click', ()=>{
    openPlay(detailRoundId);
  });
  document.getElementById('btn-detail-del').addEventListener('click', ()=>{
    const r = rounds.find(x=>x.id===detailRoundId);
    askConfirm('라운드 삭제', `${r.courseName} 기록을 삭제할까요?`, ()=>{
      rounds = rounds.filter(x=>x.id !== detailRoundId);
      saveRounds(rounds);
      showScreen('screen-home');
      renderHome();
      showToast('삭제되었습니다');
    });
  });

  /* editing an already-finished round: opens the play screen; finishing again keeps it saved as finished */

  /* ---------------- init ---------------- */
  renderHome();
})();
</script>
</body>
</html>
